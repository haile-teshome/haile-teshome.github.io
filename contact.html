<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Haile Teshome</title>
<meta name="description" content="Get in touch with Haile Teshome — health AI, multimodal models, and research collaborations." />
<style>
/* ============================================================
   Haile Teshome — personal site
   Shared design system
   ============================================================ */

/* ---------- Fonts ---------- */
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap');

/* ---------- Tokens ---------- */
:root {
  --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* warm paper light theme */
  --bg:        oklch(0.992 0.004 80);
  --bg-2:      oklch(0.972 0.006 78);
  --bg-3:      oklch(0.952 0.008 76);
  --text:      oklch(0.235 0.012 60);
  --text-2:    oklch(0.50 0.014 62);
  --text-3:    oklch(0.62 0.012 64);
  --border:    oklch(0.90 0.008 72);
  --border-2:  oklch(0.84 0.010 72);
  --accent:    oklch(0.605 0.165 42);
  --accent-h:  oklch(0.555 0.175 40);
  --accent-soft: oklch(0.93 0.04 55);
  --accent-text: oklch(0.55 0.17 41);
  --shadow: 0 1px 2px oklch(0.4 0.02 60 / 0.04), 0 8px 28px oklch(0.4 0.03 50 / 0.06);
  --shadow-lg: 0 2px 4px oklch(0.4 0.02 60 / 0.05), 0 18px 50px oklch(0.4 0.03 50 / 0.10);
  --shadow-card: 0 1px 1px oklch(0.35 0.02 60 / 0.05), 0 10px 20px -8px oklch(0.38 0.03 55 / 0.13), 0 34px 50px -26px oklch(0.38 0.03 55 / 0.16);
  --shadow-card-h: 0 2px 3px oklch(0.35 0.02 60 / 0.06), 0 18px 32px -10px oklch(0.38 0.03 55 / 0.18), 0 50px 70px -30px oklch(0.38 0.03 55 / 0.22);

  --maxw: 1180px;
  --nav-h: 68px;
  --r: 14px;
  --r-sm: 9px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

html[data-theme="dark"] {
  --bg:        oklch(0.185 0.008 62);
  --bg-2:      oklch(0.222 0.010 62);
  --bg-3:      oklch(0.262 0.012 62);
  --text:      oklch(0.945 0.006 80);
  --text-2:    oklch(0.715 0.012 72);
  --text-3:    oklch(0.60 0.012 70);
  --border:    oklch(0.315 0.012 64);
  --border-2:  oklch(0.385 0.014 64);
  --accent:    oklch(0.715 0.155 48);
  --accent-h:  oklch(0.775 0.150 50);
  --accent-soft: oklch(0.33 0.06 45);
  --accent-text: oklch(0.78 0.15 50);
  --shadow: 0 1px 2px oklch(0 0 0 / 0.30), 0 10px 30px oklch(0 0 0 / 0.35);
  --shadow-lg: 0 2px 6px oklch(0 0 0 / 0.35), 0 22px 60px oklch(0 0 0 / 0.50);
  --shadow-card: 0 1px 1px oklch(0 0 0 / 0.30), 0 12px 24px -8px oklch(0 0 0 / 0.42), 0 36px 54px -26px oklch(0 0 0 / 0.55);
  --shadow-card-h: 0 2px 4px oklch(0 0 0 / 0.35), 0 20px 36px -10px oklch(0 0 0 / 0.50), 0 54px 76px -30px oklch(0 0 0 / 0.62);
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; scroll-padding-top: calc(var(--nav-h) + 24px); }
@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

body {
  margin: 0;
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.011em;
  transition: background 0.5s var(--ease), color 0.4s var(--ease);
}

::selection { background: var(--accent-soft); color: var(--text); }

a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
h1,h2,h3,h4 { font-weight: 600; line-height: 1.08; letter-spacing: -0.025em; margin: 0; }

.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 32px; }
.mono { font-family: var(--font-mono); }

/* ---------- Eyebrow / section labels ---------- */
.eyebrow {
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent-text);
  display: inline-flex;
  align-items: center;
  gap: 9px;
}
.eyebrow::before {
  content: "";
  width: 7px; height: 7px;
  border-radius: 2px;
  background: var(--accent);
  transform: rotate(45deg);
}

/* ============================================================
   NAV
   ============================================================ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  height: var(--nav-h);
  display: flex; align-items: center;
  background: color-mix(in oklab, var(--bg) 78%, transparent);
  backdrop-filter: saturate(1.6) blur(16px);
  -webkit-backdrop-filter: saturate(1.6) blur(16px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.4s var(--ease), background 0.4s var(--ease);
}
.nav.scrolled { border-bottom-color: var(--border); }
.nav .wrap { display: flex; align-items: center; justify-content: space-between; width: 100%; }

.brand { display: flex; align-items: center; gap: 11px; font-weight: 600; letter-spacing: -0.02em; }
.brand .mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent);
  color: oklch(0.99 0.01 80);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-weight: 600; font-size: 14px;
  letter-spacing: -0.04em;
  box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.18);
}
.brand .mark span { transform: translateY(0.5px); }

.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-links a {
  font-size: 14.5px; font-weight: 450;
  color: var(--text-2);
  padding: 8px 13px; border-radius: 8px;
  position: relative;
  transition: color 0.2s, background 0.2s;
}
.nav-links a:hover { color: var(--text); background: var(--bg-2); }
.nav-links a.active { color: var(--text); }
.nav-links a.active::after {
  content: ""; position: absolute; left: 13px; right: 13px; bottom: 2px;
  height: 2px; border-radius: 2px; background: var(--accent);
}

.nav-tools { display: flex; align-items: center; gap: 8px; }

.icon-btn {
  width: 38px; height: 38px; border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--bg-2);
  color: var(--text-2);
  display: grid; place-items: center; cursor: pointer;
  transition: all 0.2s var(--ease);
}
.icon-btn:hover { color: var(--text); border-color: var(--border-2); transform: translateY(-1px); }
.icon-btn svg { width: 17px; height: 17px; }

.cmd-btn {
  display: flex; align-items: center; gap: 9px;
  height: 38px; padding: 0 11px 0 12px;
  border: 1px solid var(--border); border-radius: 9px;
  background: var(--bg-2); color: var(--text-3);
  font-family: var(--font-mono); font-size: 12.5px; cursor: pointer;
  transition: all 0.2s var(--ease);
}
.cmd-btn:hover { color: var(--text); border-color: var(--border-2); }
.cmd-btn kbd {
  font-family: var(--font-mono); font-size: 11px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; padding: 1px 5px; color: var(--text-2);
}
.cmd-btn svg { width: 15px; height: 15px; }

.menu-btn { display: none; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 9px;
  font-family: var(--font-sans); font-size: 15px; font-weight: 500;
  padding: 12px 20px; border-radius: 10px; cursor: pointer;
  border: 1px solid transparent; transition: all 0.22s var(--ease);
  white-space: nowrap;
}
.btn svg { width: 16px; height: 16px; }
.btn-primary { background: var(--accent); color: oklch(0.99 0.01 80); box-shadow: var(--shadow); }
.btn-primary:hover { background: var(--accent-h); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.btn-ghost { background: var(--bg-2); color: var(--text); border-color: var(--border); }
.btn-ghost:hover { border-color: var(--border-2); transform: translateY(-2px); background: var(--bg-3); }

/* ============================================================
   SECTION / generic
   ============================================================ */
main { padding-top: var(--nav-h); }
.section { padding: 96px 0; }
.section-head { margin-bottom: 48px; max-width: 760px; }
.section-head .eyebrow { margin-bottom: 18px; }
.section-head h2 { font-size: clamp(30px, 4vw, 44px); letter-spacing: -0.03em; }
.section-head p { color: var(--text-2); font-size: 18px; margin: 16px 0 0; max-width: 640px; }

.page-hero { padding: 70px 0 30px; }
.page-hero h1 { font-size: clamp(38px, 6vw, 64px); letter-spacing: -0.035em; margin-top: 16px; }
.page-hero p { color: var(--text-2); font-size: clamp(17px, 2vw, 20px); margin: 20px 0 0; max-width: 620px; }

/* ---------- Reveal animation ---------- */
.reveal { opacity: 0; transform: translateY(22px); transition: opacity 0.7s var(--ease), transform 0.7s var(--ease); }
.reveal.in { opacity: 1; transform: none; }
.reveal[data-d="1"] { transition-delay: 0.06s; }
.reveal[data-d="2"] { transition-delay: 0.12s; }
.reveal[data-d="3"] { transition-delay: 0.18s; }
.reveal[data-d="4"] { transition-delay: 0.24s; }
.reveal[data-d="5"] { transition-delay: 0.30s; }
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1 !important; transform: none !important; }
}

/* ============================================================
   COMMAND PALETTE
   ============================================================ */
.cmdk {
  position: fixed; inset: 0; z-index: 100;
  display: none; align-items: flex-start; justify-content: center;
  padding-top: 14vh;
  background: oklch(0.2 0.01 60 / 0.42);
  backdrop-filter: blur(6px);
  opacity: 0; transition: opacity 0.18s ease;
}
.cmdk.open { display: flex; opacity: 1; }
.cmdk-panel {
  width: min(580px, 92vw);
  background: var(--bg);
  border: 1px solid var(--border-2);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  transform: translateY(-8px) scale(0.985);
  transition: transform 0.22s var(--ease);
}
.cmdk.open .cmdk-panel { transform: none; }
.cmdk-search { display: flex; align-items: center; gap: 12px; padding: 16px 18px; border-bottom: 1px solid var(--border); }
.cmdk-search svg { width: 18px; height: 18px; color: var(--text-3); flex: none; }
.cmdk-search input {
  flex: 1; border: none; background: none; outline: none;
  font-family: var(--font-sans); font-size: 16.5px; color: var(--text);
}
.cmdk-search input::placeholder { color: var(--text-3); }
.cmdk-search .esc { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); border: 1px solid var(--border); border-radius: 5px; padding: 2px 6px; }
.cmdk-list { max-height: 52vh; overflow-y: auto; padding: 8px; }
.cmdk-group-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); padding: 12px 12px 6px; }
.cmdk-item {
  display: flex; align-items: center; gap: 13px;
  padding: 11px 12px; border-radius: 9px; cursor: pointer;
  color: var(--text-2);
}
.cmdk-item .ic { width: 30px; height: 30px; border-radius: 8px; background: var(--bg-2); border: 1px solid var(--border); display: grid; place-items: center; flex: none; }
.cmdk-item .ic svg { width: 15px; height: 15px; }
.cmdk-item .t { flex: 1; }
.cmdk-item .t b { display: block; font-weight: 500; font-size: 15px; color: var(--text); letter-spacing: -0.01em; }
.cmdk-item .t small { font-size: 12.5px; color: var(--text-3); }
.cmdk-item .go { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); opacity: 0; }
.cmdk-item.sel { background: var(--bg-2); color: var(--text); }
.cmdk-item.sel .ic { border-color: var(--accent); color: var(--accent); }
.cmdk-item.sel .go { opacity: 1; }
.cmdk-empty { padding: 32px; text-align: center; color: var(--text-3); font-size: 14px; }

/* ============================================================
   FOOTER
   ============================================================ */
.footer { padding: 28px 0 56px; margin-top: 40px; }
.footer-grid { display: grid; grid-template-columns: 1.6fr 1fr 1fr; gap: 40px; }
.footer h4 { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; font-weight: 500; }
.footer .f-brand { font-size: 19px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 12px; }
.footer .f-desc { color: var(--text-2); font-size: 15px; max-width: 300px; }
.footer ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 11px; }
.footer ul a { color: var(--text-2); font-size: 15px; transition: color 0.2s; display: inline-flex; align-items: center; gap: 8px; }
.footer ul a:hover { color: var(--accent-text); }
.footer-base { display: flex; justify-content: space-between; align-items: center; margin-top: 52px; padding-top: 26px; border-top: 1px solid var(--border); color: var(--text-3); font-size: 13px; font-family: var(--font-mono); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 860px) {
  body { font-size: 16px; }
  .nav-links, .cmd-btn .lbl { display: none; }
  .menu-btn { display: grid; }
  .section { padding: 64px 0; }
  .footer-grid { grid-template-columns: 1fr; gap: 32px; }
  .wrap { padding: 0 22px; }

  .nav-links.open {
    display: flex; position: absolute; top: var(--nav-h); left: 0; right: 0;
    flex-direction: column; align-items: stretch; gap: 2px;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 12px 18px 18px;
  }
  .nav-links.open a { padding: 13px 14px; font-size: 16px; }
  .nav-links.open a.active::after { display: none; }
}

</style>
<style>
  /* ---------- Contact page ---------- */
  .contact-grid { display: grid; grid-template-columns: 1fr; gap: 28px; max-width: 640px; margin: 0 auto; }

  /* photo card with attached links */
  .photo-card {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r);
    box-shadow: var(--shadow-card); overflow: hidden; display: flex; flex-direction: column;
  }
  .photo-card image-slot { display: block; width: 100%; aspect-ratio: 4 / 5; }
  .photo-links { display: flex; gap: 10px; padding: 14px; border-top: 1px solid var(--border); }
  .plink {
    flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 14px; font-weight: 500; color: var(--text);
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 12px; transition: all 0.2s var(--ease);
  }
  .plink svg { width: 16px; height: 16px; }
  .plink:hover { border-color: color-mix(in oklab, var(--accent) 45%, var(--border)); color: var(--accent-text); transform: translateY(-2px); }

  /* message form */
  .form-card {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r);
    box-shadow: var(--shadow-card); padding: 32px 32px 30px; display: flex; flex-direction: column;
  }
  .form-card h2 { font-size: 23px; letter-spacing: -0.025em; margin-bottom: 24px; }
  .form-card .lede { color: var(--text-2); font-size: 15.5px; margin: 8px 0 24px; }
  .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
  .field label { font-family: var(--font-mono); font-size: 11.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); }
  .field input, .field textarea {
    width: 100%; font-family: var(--font-sans); font-size: 15.5px; color: var(--text);
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; transition: border-color 0.2s, box-shadow 0.2s; resize: vertical;
  }
  .field textarea { min-height: 150px; line-height: 1.55; }
  .field input::placeholder, .field textarea::placeholder { color: var(--text-3); }
  .field input:focus, .field textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
  }
  .form-foot { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 4px; }
  .form-note { font-size: 13px; color: var(--text-3); }
  .form-card .btn-primary { border: none; }
  .form-error { color: var(--accent-text); font-size: 13.5px; min-height: 18px; margin-top: 2px; }

  /* success state */
  .form-success { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; flex: 1; padding: 24px 0; }
  .form-card.sent .form-body { display: none; }
  .form-card.sent .form-success { display: flex; }
  .form-success .tick { width: 58px; height: 58px; border-radius: 50%; background: color-mix(in oklab, var(--accent) 15%, var(--bg)); border: 1px solid color-mix(in oklab, var(--accent) 40%, var(--border)); color: var(--accent-text); display: grid; place-items: center; margin-bottom: 18px; }
  .form-success .tick svg { width: 26px; height: 26px; }
  .form-success h3 { font-size: 21px; letter-spacing: -0.02em; margin-bottom: 8px; }
  .form-success p { color: var(--text-2); font-size: 15px; max-width: 340px; margin: 0; }

  /* direct contact methods */
  .contact-methods { display: flex; flex-direction: column; gap: 12px; }
  .cmethod { display: flex; align-items: center; gap: 15px; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r); padding: 15px 18px; box-shadow: var(--shadow); transition: transform 0.22s var(--ease), border-color 0.22s var(--ease), box-shadow 0.22s var(--ease); }
  .cmethod:hover { border-color: var(--border-2); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .cmethod .cm-ic { width: 42px; height: 42px; flex: none; border-radius: 11px; background: var(--bg); border: 1px solid var(--border); display: grid; place-items: center; color: var(--accent-text); }
  .cmethod .cm-ic svg { width: 20px; height: 20px; }
  .cmethod .cm-text { display: flex; flex-direction: column; min-width: 0; }
  .cm-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); }
  .cm-value { font-size: 15.5px; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cmethod .cm-arrow { margin-left: auto; color: var(--text-3); transition: transform 0.2s var(--ease), color 0.2s var(--ease); }
  .cmethod:hover .cm-arrow { color: var(--accent); transform: translate(2px, -2px); }
  .cmethod .cm-arrow svg { width: 17px; height: 17px; }

  @media (max-width: 860px) {
    .contact-grid { grid-template-columns: 1fr; }
    .photo-card image-slot { aspect-ratio: 16 / 11; }
    .form-card { padding: 26px 22px; }
  }
</style>
</head>
<body>

<header class="nav">
  <div class="wrap">
    <a class="brand" href="index.html"><span class="mark"><span>ht</span></span> Haile Teshome</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="experience.html">Experience</a>
      <a href="research.html">Portfolio</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <div class="nav-tools">
      <button class="cmd-btn" data-cmdk-open aria-label="Open command menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
        <span class="lbl">Search</span><kbd>⌘K</kbd>
      </button>
      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme"></button>
      <button class="icon-btn menu-btn" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
    </div>
  </div>
</header>

<main>
<section class="page-hero">
  <div class="wrap">
    <div class="eyebrow reveal">Contact</div>
  </div>
</section>

<section class="section" style="padding-top: 40px;">
  <div class="wrap">
    <div class="contact-grid">
      <!-- Message form -->
      <form class="form-card reveal" id="contactForm" novalidate>
        <div class="form-body">
          <h2>Send a message</h2>
          <div class="field">
            <label for="cf-email">Your email</label>
            <input type="email" id="cf-email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="cf-message">Message</label>
            <textarea id="cf-message" name="message" placeholder="What's on your mind?" required></textarea>
          </div>
          <div class="form-error" id="cf-error" role="alert"></div>
          <div class="form-foot">
            <span class="form-note">I usually reply within a day or two.</span>
            <button type="submit" class="btn btn-primary">Send message <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg></button>
          </div>
        </div>
        <div class="form-success">
          <div class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
          <h3>Thanks — message ready</h3>

<script>
/* ============================================================
   Haile Teshome — site interactions
   ============================================================ */
(function () {
  /* ---------- Theme ---------- */
  const root = document.documentElement;
  const stored = localStorage.getItem('ht-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  root.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));

  function setTheme(t) {
    root.setAttribute('data-theme', t);
    localStorage.setItem('ht-theme', t);
    paintToggle();
  }
  function paintToggle() {
    const t = root.getAttribute('data-theme');
    document.querySelectorAll('[data-theme-toggle]').forEach(btn => {
      btn.innerHTML = t === 'dark'
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
    });
  }
  document.addEventListener('click', e => {
    const tog = e.target.closest('[data-theme-toggle]');
    if (tog) setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
  paintToggle();

  /* ---------- Nav scroll state + mobile menu ---------- */
  const nav = document.querySelector('.nav');
  const onScroll = () => { if (nav) nav.classList.toggle('scrolled', window.scrollY > 8); };
  onScroll();
  window.addEventListener('scroll', onScroll, { passive: true });

  document.addEventListener('click', e => {
    if (e.target.closest('.menu-btn')) {
      document.querySelector('.nav-links')?.classList.toggle('open');
    } else if (!e.target.closest('.nav-links')) {
      document.querySelector('.nav-links')?.classList.remove('open');
    }
  });

  /* ---------- Scroll reveal ---------- */
  const io = new IntersectionObserver((entries) => {
    entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
  }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  /* ---------- Command palette ---------- */
  const PAGES = [
    { t: 'Home', d: 'Intro & news', u: 'index.html', g: 'Pages', ic: 'home' },
    { t: 'Portfolio', d: 'Papers & projects', u: 'research.html', g: 'Pages', ic: 'doc' },
    { t: 'Experience', d: 'Roles, talks & teaching', u: 'experience.html', g: 'Pages', ic: 'brief' },
    { t: 'Contact', d: 'Get in touch', u: 'contact.html', g: 'Pages', ic: 'mail' },
    { t: 'Email Haile', d: 'haile.teshome@ucsf.edu', u: 'mailto:haile.teshome@ucsf.edu', g: 'Connect', ic: 'mail' },
    { t: 'LinkedIn', d: 'in/haile-teshome', u: 'https://www.linkedin.com/in/haile-teshome', g: 'Connect', ic: 'link' },
    { t: 'Download CV', d: '.docx', u: 'Haile_Teshome_CV.docx', g: 'Connect', ic: 'down' },
    { t: 'Toggle theme', d: 'Light / dark', u: '#theme', g: 'Actions', ic: 'sun' },
  ];
  const ICONS = {
    home: '<path d="M3 10.5 12 3l9 7.5M5 9.5V21h14V9.5"/>',
    flask: '<path d="M9 3h6M10 3v6.5L5 19a2 2 0 0 0 1.8 3h10.4A2 2 0 0 0 19 19l-5-9.5V3"/>',
    doc: '<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8zM14 3v5h5M9 13h6M9 17h6"/>',
    brief: '<rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
    pen: '<path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>',
    mail: '<rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>',
    link: '<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/>',
    down: '<path d="M12 3v12M7 11l5 5 5-5M5 21h14"/>',
    sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',
  };

  const cmdk = document.createElement('div');
  cmdk.className = 'cmdk';
  cmdk.innerHTML = `
    <div class="cmdk-panel" role="dialog" aria-modal="true">
      <div class="cmdk-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
        <input type="text" placeholder="Jump to a page, or search…" aria-label="Command search" />
        <span class="esc">ESC</span>
      </div>
      <div class="cmdk-list"></div>
    </div>`;
  document.body.appendChild(cmdk);
  const input = cmdk.querySelector('input');
  const list = cmdk.querySelector('.cmdk-list');
  let sel = 0, filtered = [];

  function renderList() {
    const q = input.value.trim().toLowerCase();
    filtered = PAGES.filter(p => !q || (p.t + ' ' + p.d + ' ' + p.g).toLowerCase().includes(q));
    if (sel >= filtered.length) sel = Math.max(0, filtered.length - 1);
    if (!filtered.length) { list.innerHTML = '<div class="cmdk-empty">No matches</div>'; return; }
    let html = '', lastG = '';
    filtered.forEach((p, i) => {
      if (p.g !== lastG) { html += `<div class="cmdk-group-label">${p.g}</div>`; lastG = p.g; }
      html += `<div class="cmdk-item${i === sel ? ' sel' : ''}" data-i="${i}">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[p.ic] || ''}</svg></div>
        <div class="t"><b>${p.t}</b><small>${p.d}</small></div>
        <span class="go">↵</span>
      </div>`;
    });
    list.innerHTML = html;
  }
  function exec(p) {
    if (!p) return;
    closeCmdk();
    if (p.u === '#theme') { setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); return; }
    if (p.u.startsWith('http') || p.u.startsWith('mailto') || p.u.endsWith('.docx')) { window.open(p.u, p.u.startsWith('http') ? '_blank' : '_self'); return; }
    window.location.href = p.u;
  }
  function openCmdk() { cmdk.classList.add('open'); input.value = ''; sel = 0; renderList(); setTimeout(() => input.focus(), 30); }
  function closeCmdk() { cmdk.classList.remove('open'); }

  input.addEventListener('input', () => { sel = 0; renderList(); });
  list.addEventListener('mousemove', e => { const it = e.target.closest('.cmdk-item'); if (it) { sel = +it.dataset.i; renderList(); } });
  list.addEventListener('click', e => { const it = e.target.closest('.cmdk-item'); if (it) exec(filtered[+it.dataset.i]); });
  cmdk.addEventListener('click', e => { if (e.target === cmdk) closeCmdk(); });

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); cmdk.classList.contains('open') ? closeCmdk() : openCmdk(); return; }
    if (!cmdk.classList.contains('open')) {
      if (e.key === '/' && !/input|textarea/i.test(document.activeElement.tagName)) { e.preventDefault(); openCmdk(); }
      return;
    }
    if (e.key === 'Escape') closeCmdk();
    else if (e.key === 'ArrowDown') { e.preventDefault(); sel = Math.min(sel + 1, filtered.length - 1); renderList(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); sel = Math.max(sel - 1, 0); renderList(); }
    else if (e.key === 'Enter') { e.preventDefault(); exec(filtered[sel]); }
  });
  document.addEventListener('click', e => { if (e.target.closest('[data-cmdk-open]')) openCmdk(); });
})();
</script>

<script>
(function () {
  /* ------------------------------------------------------------------
     Where messages go. Two modes, no personal info shown on the page:

     1. Hosted form endpoint (recommended) — paste a Formspree/Basin/
        FormSubmit URL into FORM_ENDPOINT and the message is sent in the
        background, no email app needed. e.g. 'https://formspree.io/f/abc123'
     2. Fallback (default) — opens the visitor's own mail app pre-filled to
        the address assembled below (kept in JS, never rendered as text).
  ------------------------------------------------------------------ */
  const FORM_ENDPOINT = '';
  const TO = ['haile.teshome', 'ucsf.edu'].join('@');

  const form = document.getElementById('contactForm');
  if (!form) return;
  const emailEl = document.getElementById('cf-email');
  const msgEl = document.getElementById('cf-message');
  const errEl = document.getElementById('cf-error');
  const okMsg = document.getElementById('cf-success-msg');
  const validEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.textContent = '';
    const email = emailEl.value.trim();
    const message = msgEl.value.trim();

    if (!validEmail(email)) { errEl.textContent = 'Please enter a valid email address.'; emailEl.focus(); return; }
    if (message.length < 2) { errEl.textContent = 'Please write a short message.'; msgEl.focus(); return; }

    if (FORM_ENDPOINT) {
      const btn = form.querySelector('button[type="submit"]');
      const label = btn.innerHTML;
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const res = await fetch(FORM_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ email, message })
        });
        if (!res.ok) throw new Error('bad status');
        okMsg.textContent = "Your message has been sent. I'll reply soon.";
        form.classList.add('sent');
      } catch (err) {
        btn.disabled = false; btn.innerHTML = label;
        errEl.textContent = 'Something went wrong — please try again in a moment.';
      }
      return;
    }

    // Fallback: open the visitor's mail app, pre-filled.
    const subject = encodeURIComponent('Hello from your website');
    const body = encodeURIComponent(message + '\n\n— ' + email);
    window.location.href = `mailto:${TO}?subject=${subject}&body=${body}`;
    okMsg.textContent = 'Your email app is opening so you can hit send. I\u2019ll reply soon.';
    form.classList.add('sent');
  });
})();
</script>
<script>
/* Color theme — drives the CSS accent custom properties AND the hero-canvas
   palette, tuned per light/dark. Selection persists in localStorage. */
(function(){
  const root=document.documentElement;
  const ok=(l,c,h)=>'oklch('+l+' '+c+' '+h+')';
  // pL/pC/pH = primary lightness(light-mode)/chroma/hue ; sC/sH = secondary chroma/hue ; two = two-tone
  const THEMES={
    warm:       {name:'Warm clay',     pL:0.605, pC:0.165, pH:42,  sC:0.075, sH:78 },
    forest:     {name:'Forest',        pL:0.515, pC:0.090, pH:150, sC:0.050, sH:150},
    oxblood:    {name:'Oxblood',       pL:0.495, pC:0.130, pH:27,  sC:0.070, sH:30 },
    tealsand:   {name:'Teal + sand',   pL:0.550, pC:0.090, pH:188, sC:0.075, sH:80,  two:true},
    navycopper: {name:'Navy + copper', pL:0.495, pC:0.120, pH:258, sC:0.105, sH:52,  two:true},
    forestclay: {name:'Forest + clay', pL:0.510, pC:0.090, pH:150, sC:0.105, sH:45,  two:true},
    petrol:     {name:'Petrol',        pL:0.520, pC:0.085, pH:205, sC:0.050, sH:205},
    inkteal:    {name:'Ink & teal',    pL:0.530, pC:0.085, pH:192, sC:0.045, sH:220},
    clinical:   {name:'Clinical blue', pL:0.520, pC:0.120, pH:252, sC:0.060, sH:252}
  };
  const ORDER=['warm','forest','oxblood','tealsand','navycopper','forestclay','petrol','inkteal','clinical'];

  // 1x1 canvas resolves oklch() -> sRGB rgb[] reliably for the hero canvas
  const pcan=document.createElement('canvas'); pcan.width=pcan.height=1;
  const pctx=pcan.getContext('2d');
  function toRGB(str){ pctx.fillStyle='#000'; pctx.fillStyle=str; pctx.fillRect(0,0,1,1); const d=pctx.getImageData(0,0,1,1).data; return [d[0],d[1],d[2]]; }

  function cssVars(th,dark){
    if(dark) return {
      '--accent':      ok(0.74, th.pC*0.95, th.pH),
      '--accent-h':    ok(0.80, th.pC*0.90, th.pH),
      '--accent-soft': ok(0.33, 0.060,      th.pH),
      '--accent-text': ok(0.80, th.pC*0.90, th.pH)
    };
    return {
      '--accent':      ok(th.pL,        th.pC,      th.pH),
      '--accent-h':    ok(th.pL-0.055,  th.pC*1.04, th.pH),
      '--accent-soft': ok(0.93,         0.045,      th.pH),
      '--accent-text': ok(th.pL-0.035,  th.pC,      th.pH)
    };
  }

  let currentId='warm', current=THEMES.warm;
  window.__heroAccent=function(dark){
    const th=current;
    return {
      a: toRGB(ok(dark?0.70:0.55, th.pC,      th.pH)),
      b: toRGB(ok(dark?0.66:0.60, th.sC,      th.sH)),
      maxA: dark?0.50:0.40, dot: dark?0.55:0.50, line: dark?0.16:0.14
    };
  };

  function apply(id){
    currentId = THEMES[id] ? id : 'warm';
    current = THEMES[currentId];
    const dark = root.getAttribute('data-theme')==='dark';
    const v = cssVars(current, dark);
    for(const k in v) root.style.setProperty(k, v[k]);
    try{ localStorage.setItem('ht-accent', currentId); }catch(e){}
    if(window.__refreshHeroPal) window.__refreshHeroPal();
  }
  window.__setAccent = apply;
  window.__getAccent = ()=>currentId;
  window.__accentThemes = ()=>ORDER.map(id=>({ id, name:THEMES[id].name, two:!!THEMES[id].two,
    primary: ok(THEMES[id].pL+0.02, THEMES[id].pC, THEMES[id].pH),
    secondary: ok(0.62, THEMES[id].sC+0.02, THEMES[id].sH) }));

  // re-tune accent when light/dark flips
  new MutationObserver(()=>apply(currentId)).observe(root,{attributes:true,attributeFilter:['data-theme']});

  let saved='warm'; try{ saved=localStorage.getItem('ht-accent')||'warm'; }catch(e){}
  apply(THEMES[saved]?saved:'warm');
})();
</script>
<script>
/* Tweaks panel — choose the hero background. Hidden until Tweaks is toggled
   from the toolbar. Selection persists in localStorage. */
(function(){
  const OPTIONS=[
    {id:'neural', label:'Neural net', desc:'Synapses firing across the web'},
    {id:'slime', label:'Slime trails', desc:'Branching vein networks'},
    {id:'boids', label:'Flocking', desc:'A murmuration of dots'},
    {id:'metaballs', label:'Metaballs', desc:'Merging liquid blobs'},
    {id:'magnetic', label:'Magnetic field', desc:'Field lines around the cursor'},
    {id:'ripple', label:'Ripple pond', desc:'Interfering click ripples'},
    {id:'gravity', label:'Gravity well', desc:'Points orbit your cursor'},
    {id:'halftone', label:'Halftone', desc:'Dot grid lit like a spotlight'},
    {id:'ascii', label:'ASCII rain', desc:'Glyph grid, columns self-type'},
    {id:'pixel', label:'Pixel sweep', desc:'LED matrix, light bars sweep'},
    {id:'cross', label:'Plus grid', desc:'Swiss crosses tilt to cursor'},
    {id:'aurora', label:'Aurora', desc:'Soft drifting light ribbons'},
    {id:'harmonograph', label:'Harmonograph', desc:'Pendulum line art'},
    {id:'contour', label:'Contours', desc:'A living topographic map'},
    {id:'flow', label:'Flow field', desc:'Silky drifting streamlines'},
    {id:'constellation', label:'Constellation', desc:'Linked drifting dots'},
    {id:'orbs', label:'Soft orbs', desc:'Floating warm bokeh'},
    {id:'mesh', label:'Elastic mesh', desc:'Springy interactive grid'},
    {id:'minimal', label:'Minimal', desc:'Just a soft glow'}
  ];
  const style=document.createElement('style');
  style.textContent=
   '.tw-panel{position:fixed;right:18px;bottom:18px;z-index:200;width:266px;'+

   '.tw-panel.open{display:block;animation:twin .18s ease;}'+
   '@keyframes twin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}'+
   '.tw-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}'+
   '.tw-title{font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);}'+
   '.tw-x{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--bg-2);color:var(--text-2);cursor:pointer;display:grid;place-items:center;font-size:12px;line-height:1;}'+

   '.tw-label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:9px;}'+
   '.tw-opts{display:flex;flex-direction:column;gap:6px;max-height:min(58vh,470px);overflow-y:auto;margin:-2px -4px -2px 0;padding:2px 4px 2px 0;}'+
   '.tw-opt{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;border:1px solid var(--border);background:var(--bg-2);cursor:pointer;text-align:left;transition:border-color .18s,background .18s;}'+
   '.tw-opt:hover{border-color:var(--border-2);}'+
   '.tw-opt.sel{border-color:var(--accent);background:color-mix(in oklab,var(--accent) 9%,var(--bg-2));}'+
   '.tw-dot{width:9px;height:9px;border-radius:50%;background:var(--border-2);flex:none;}'+
   '.tw-opt.sel .tw-dot{background:var(--accent);}'+
   '.tw-opt b{font-size:13.5px;font-weight:500;display:block;letter-spacing:-.01em;color:var(--text);}'+
   '.tw-opt small{font-size:11.5px;color:var(--text-3);}'+
   '.tw-themes{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:6px;}'+
   '.tw-sw{width:30px;height:30px;border-radius:50%;border:1.5px solid color-mix(in oklab,var(--text) 18%,transparent);cursor:pointer;padding:0;transition:transform .15s;position:relative;}'+
   '.tw-sw:hover{transform:scale(1.12);}'+
   '.tw-sw.sel{outline:2px solid var(--text);outline-offset:2px;border-color:transparent;}'+
   '.tw-themename{font-size:12px;color:var(--text-2);margin:2px 0 16px;min-height:15px;}';
  document.head.appendChild(style);

  const panel=document.createElement('div');
  panel.className='tw-panel';
  const hasHero = typeof window.__setHeroBg==='function';
  panel.innerHTML='<div class="tw-head"><span class="tw-title">Tweaks</span>'+
    '<button class="tw-x" aria-label="Close">\u2715</button></div>'+
    '<div class="tw-label">Color theme</div><div class="tw-themes"></div><div class="tw-themename"></div>'+
    (hasHero ? '<div class="tw-label">Hero background</div><div class="tw-opts"></div>' : '');
  document.body.appendChild(panel);

  // ---- color theme swatches ----
  const themesWrap=panel.querySelector('.tw-themes');
  const nameEl=panel.querySelector('.tw-themename');
  const themes=(window.__accentThemes&&window.__accentThemes())||[];
  const curTheme=(window.__getAccent&&window.__getAccent())||'warm';
  themes.forEach(th=>{
    const b=document.createElement('button');
    b.className='tw-sw'+(th.id===curTheme?' sel':'');
    b.type='button'; b.title=th.name; b.setAttribute('aria-label',th.name);
    b.style.background = th.two
      ? 'linear-gradient(135deg, '+th.primary+' 0 50%, '+th.secondary+' 50% 100%)'
      : th.primary;
    if(th.id===curTheme) nameEl.textContent=th.name+(th.two?'  ·  two-tone':'');
    b.addEventListener('click',()=>{
      themesWrap.querySelectorAll('.tw-sw').forEach(x=>x.classList.remove('sel'));

      if(window.__setAccent) window.__setAccent(th.id);

  });

  const opts=panel.querySelector('.tw-opts');
  if(hasHero && opts){
    const current=(window.__getHeroBg&&window.__getHeroBg())||'flow';

      opts.appendChild(el);
    });
  }

  panel.querySelector('.tw-x').addEventListener('click',()=>{ panel.classList.remove('open'); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); });
  window.addEventListener('message',e=>{ const ty=e&&e.data&&e.data.type; if(ty==='__activate_edit_mode')panel.classList.add('open'); else if(ty==='__deactivate_edit_mode')panel.classList.remove('open'); });
  window.parent.postMessage({type:'__edit_mode_available'},'*');
})();
</script>
